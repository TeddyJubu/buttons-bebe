name: PR review gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      # This deliberately does not check out or execute PR code. It keeps a
      # read-only token and publishes the report to the job summary.
      - name: Summarize change risk and enforce repository guardrails
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- buttons-bebe-pr-review -->";
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const names = files.map((file) => file.filename);
            const inAny = (patterns) => names.some((name) => patterns.some((pattern) => pattern.test(name)));
            const categories = [
              ["Security or deployment", [
                /^\.github\/workflows\//,
                /(^|\/)(?:Caddyfile|[^/]+\.service)$/,
                /(^|\/)(?:auth|security|credential)/i,
                /^whatsapp-connect\//,
              ]],
              ["Production runtime", [/^(?:processor|webhook|tools|kb-admin)\//, /^(?:kb|KB)\/scripts\//]],
              ["Knowledge base", [/^(?:kb|KB)\/(?:policies|tickets|intents|faq)\//]],
              ["Dashboard", [/^(?:console-src|dashboard)\//]],
              ["Documentation", [/\.md$/]],
            ].filter(([, patterns]) => inAny(patterns)).map(([name]) => name);

            const environmentFiles = names.filter((name) =>
              /(^|\/)\.env(?:$|\.[^/]+$)/.test(name) && !name.endsWith(".example"),
            );
            const secretPatterns = [
              /AKIA[0-9A-Z]{16}/,
              /gh[pousr]_[A-Za-z0-9_]{30,}/,
              /github_pat_[A-Za-z0-9_]{20,}/,
              /sk-[A-Za-z0-9]{20,}/,
              /-----BEGIN [A-Z ]+ PRIVATE KEY-----/,
            ];
            const secretFiles = files
              .filter((file) => file.patch && secretPatterns.some((pattern) => pattern.test(file.patch)))
              .map((file) => file.filename);
            const blockers = [
              ...environmentFiles.map((name) => `Real environment file changed: \`${name}\``),
              ...secretFiles.map((name) => `Possible committed credential in \`${name}\``),
            ];

            const risk = categories.includes("Security or deployment")
              ? "High — security/deployment change; manual review is required before release."
              : categories.includes("Production runtime")
                ? "Medium — production behavior changed; verify the CI release gate and deployment plan."
                : "Low — no production security or runtime paths changed.";
            const sample = names.slice(0, 20).map((name) => `- \`${name}\``).join("\n") || "- No file changes detected";
            const body = [
              marker,
              "## Automated PR review",
              blockers.length ? "**Status: blocked**" : "**Status: passed**",
              "",
              `**Risk:** ${risk}`,
              `**Changed files:** ${files.length}`,
              `**Components:** ${categories.length ? categories.join(", ") : "General"}`,
              "",
              "### Guardrails",
              blockers.length ? blockers.map((item) => `- ${item}`).join("\n") : "- No committed-secret or real `.env` file detected.",
              "",
              "### Files reviewed",
              sample,
              "",
              `The [verify workflow](${pr.html_url}/checks) runs the executable release checks. This review gate never checks out or executes PR code.`,
            ].join("\n");

            await core.summary.addRaw(body).write();

            if (blockers.length) {
              core.setFailed(`PR review gate blocked this pull request: ${blockers.join("; ")}`);
            }
