[pytest]
# Rootdir anchors here so `pytest fable/tests/...` from the repo root picks up
# this config. Markers + a couple of noisy third-party deprecation warnings are
# declared so the suite stays quiet and `-W error`-friendly in CI.
markers =
    e2e: live-stack end-to-end tests (boot the real 4 services; need FABLE_E2E=1)

addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
