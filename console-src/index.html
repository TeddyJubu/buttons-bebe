<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Buttons Bebe — Support Console</title>
<style>
*{box-sizing:border-box;margin:0}
:root{--acc:#6d5efc;--acc-soft:#efeaff;--ink:#14161c;--ink2:#5b6472;--ink3:#8a93a3;--bg:#f6f7fb;--card:#fff;--line:#e9ebf1;--green:#12b76a;--green-s:#e7f7ee;--amber:#dc9309;--amber-s:#fdf3e0;--red:#e5484d;--red-s:#fdecec;--radius:12px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif}
body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}
.side{width:230px;background:var(--card);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;flex:0 0 230px}
.logo{display:flex;align-items:center;gap:9px;padding:6px 8px 16px;flex-wrap:wrap}
.logo .mark{width:30px;height:30px;border-radius:9px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px}
.logo b{font-size:16px;font-weight:600}.logo .tag{font-size:10px;color:var(--acc);background:var(--acc-soft);padding:2px 6px;border-radius:20px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;color:var(--ink2);font-size:14px;cursor:pointer;font-weight:500}
.nav a:hover{background:#f4f5f9}.nav a.on{background:var(--acc-soft);color:var(--acc)}
.nav a svg{width:18px;height:18px;flex:0 0 18px}
.side .store{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:10px}
.side .store .av{width:32px;height:32px;border-radius:8px;background:#eef0f6;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--ink2)}
.side .store .nm{font-size:13px;font-weight:600}.side .store .pl{font-size:11px;color:var(--ink3)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;border-bottom:1px solid var(--line);background:var(--card)}
.top h1{font-size:19px;font-weight:600}.top .sub{font-size:13px;color:var(--ink3);margin-top:2px}
.live{display:flex;align-items:center;gap:7px;font-size:13px;background:var(--green-s);color:#0a7a48;padding:6px 11px;border-radius:20px;font-weight:500;cursor:pointer}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
.wrap{padding:22px 26px;overflow:auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.kpi .l{font-size:12px;color:var(--ink3);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.kpi .v{font-size:28px;font-weight:600;margin:8px 0 4px}
.kpi .s{font-size:12.5px;color:var(--ink2)}.kpi .s.up{color:#0a7a48}.kpi .s.dn{color:var(--red)}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.side{display:none}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.panel h3{font-size:15px;font-weight:600;margin-bottom:2px}.panel .ph{font-size:12.5px;color:var(--ink3);margin-bottom:14px}
.hb{display:flex;flex-direction:column;gap:11px;padding-top:4px}
.hb .r{display:flex;align-items:center;gap:12px;font-size:13px}
.hb .r .lab{width:78px;flex:0 0 78px;color:var(--ink2)}
.hb .r .track{flex:1;height:10px;background:#f1f2f7;border-radius:6px;overflow:hidden}
.hb .r .fill{height:100%;border-radius:6px}
.hb .r .n{width:26px;text-align:right;color:var(--ink2);font-weight:600}
.act{display:flex;flex-direction:column;gap:12px}
.act .r{display:flex;gap:11px;align-items:flex-start;font-size:13.5px}
.act .r .ic{width:26px;height:26px;border-radius:7px;flex:0 0 26px;display:flex;align-items:center;justify-content:center}
.act .r .ic.g{background:var(--green-s);color:#0a7a48}.act .r .ic.a{background:var(--amber-s);color:var(--amber);font-weight:700}
.act .r .ic svg{width:15px;height:15px}
.act .r .tm{color:var(--ink3);font-size:12px;margin-left:auto;white-space:nowrap}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip{font-size:13px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--ink2);cursor:pointer;font-weight:500}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.tk{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.tk .row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-top:1px solid var(--line);cursor:pointer}
.tk .row:first-child{border-top:none}.tk .row:hover{background:#fafbfd}
.tk .who{width:170px;flex:0 0 170px;min-width:0}
.tk .who b{font-size:13.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tk .who small{font-size:12px;color:var(--ink3)}
.tk .subj{flex:1;min-width:0;font-size:13.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge.low{background:var(--green-s);color:#0a7a48}.badge.sens{background:var(--amber-s);color:var(--amber)}
.st{font-size:12px;color:var(--ink3);width:100px;text-align:right;flex:0 0 100px}
.st b{color:var(--ink2);font-weight:600}
.detail{padding:8px 26px 24px;border-top:1px solid var(--line);background:#fafbfd}
.detail .dwrap{max-width:840px}
.detail .lab{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#667085;font-weight:700;margin:0 0 7px}
.detail .lab.lab2{margin-top:18px}
.detail .msg{font-size:13.5px;color:var(--ink);line-height:1.62;white-space:pre-wrap;word-break:break-word;max-height:260px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px}
.linkbtn{background:none;border:none;color:var(--acc);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 0 0}
.pill{font-size:10px;font-weight:700;letter-spacing:.4px;background:#eef0f6;color:var(--ink2);padding:2px 7px;border-radius:20px;margin-left:4px;vertical-align:1px}
.sendhint{font-size:11.5px;color:var(--ink3);text-align:right;margin-top:7px}
.detail .draft{font-size:13.5px;color:var(--ink);line-height:1.65;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;white-space:pre-wrap}
.detail .draft.esc{background:var(--amber-s);border-color:#f3dfb0;color:#7a5406}
.warn{background:var(--amber-s);color:#7a5406;border:1px solid #f3dfb0;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:8px;font-weight:500}
.dedit{width:100%;min-height:160px;font-family:inherit;font-size:13.5px;line-height:1.6;border:1px solid var(--line);border-radius:9px;padding:12px;color:var(--ink);background:#fff;resize:vertical}
.actbar{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);flex-wrap:wrap}
.actbar .toast{margin-right:auto;color:var(--ink2)}
.editbox{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px}
.editact{display:flex;gap:8px;margin-top:8px}
.btn.send{background:var(--green);border-color:var(--green);color:#fff}.btn.send:hover{background:#0ea25c}
.btn.ghost{border-color:transparent;background:none;color:var(--ink2)}.btn.ghost:hover{background:#eef0f6;border-color:transparent}
.tk .row.open{background:#fafbfd}
.lrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-top:6px}
.lstat{background:#fafbfd;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.lstat .v{font-size:24px;font-weight:600}.lstat .l{font-size:12px;color:var(--ink3);margin-top:2px}
.conns{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.conn{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.conn .h{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.conn .ic{width:38px;height:38px;border-radius:10px;background:#f1f2f7;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--ink2);font-size:14px;flex:0 0 38px}
.conn .h b{font-size:14.5px;font-weight:600;display:block}.conn .h small{font-size:12px;color:var(--ink3)}
.conn .stt{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#0a7a48;background:var(--green-s);padding:5px 10px;border-radius:20px;font-weight:600;margin-top:2px}
.conn .dt{font-size:13px;color:var(--ink2);margin-top:10px}
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;align-items:center;gap:13px;padding:13px 0;border-top:1px solid var(--line);font-size:14px}
.step:first-child{border-top:none}
.step .ck{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 24px}
.step .ck svg{width:14px;height:14px}.step b{font-weight:600}.step small{color:var(--ink3);font-size:12.5px;display:block}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:10px;max-width:520px}
.sw{width:42px;height:24px;border-radius:20px;background:#d6dae4;position:relative;cursor:pointer;flex:0 0 42px}
.sw.on{background:var(--acc)}.sw i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s}.sw.on i{left:21px}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{font-size:12.5px;background:#f1f2f7;color:var(--ink2);padding:5px 11px;border-radius:20px;font-weight:500}
.sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink3);font-weight:600;margin:26px 0 12px}
.hint{font-size:12px;color:var(--ink3)}
.empty{padding:26px;color:var(--ink3);font-size:14px;text-align:center}
.rixbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.kbwrap{display:grid;grid-template-columns:250px 1fr;gap:16px}
@media(max-width:820px){.kbwrap{grid-template-columns:1fr}}
.kblist{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:8px;max-height:72vh;overflow:auto}
.kbgroup{margin-bottom:4px}
.kbgroup .gh{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--ink3);font-weight:600;padding:9px 8px 4px;display:flex;justify-content:space-between;align-items:center}
.kbgroup .gh button{font-size:11px;color:var(--acc);background:none;border:none;cursor:pointer;font-weight:600;padding:0}
.kbitem{display:block;width:100%;text-align:left;padding:7px 9px;border-radius:7px;font-size:13px;color:var(--ink2);cursor:pointer;border:none;background:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kbitem:hover{background:#f4f5f9}.kbitem.on{background:var(--acc-soft);color:var(--acc);font-weight:500}
.kbed{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;min-height:60vh}
.kbed .eh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.kbed .eh b{font-size:13px;color:var(--ink2);font-family:ui-monospace,Menlo,monospace}
.kbed .ef{display:flex;align-items:center;gap:12px}
.kbed textarea{width:100%;flex:1;min-height:50vh;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.55;border:1px solid var(--line);border-radius:9px;padding:12px;color:var(--ink);resize:vertical;background:#fcfcfe}
.toast{font-size:12.5px;color:#0a7a48}
.ph2{color:var(--ink3);font-size:14px;padding:34px;text-align:center}
.acctstrip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.acct{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500;color:var(--ink2)}
.acct small{color:var(--ink3);font-size:11px;font-weight:400}
.dot.off{background:var(--amber)}
.grid2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.grid2b{grid-template-columns:1fr}}
.wc-ok{display:flex;align-items:center;gap:12px}
.wc-ok .ic{width:30px;height:30px;border-radius:8px;flex:0 0 30px;display:flex;align-items:center;justify-content:center}
.wc-ok .ic.g{background:var(--green-s);color:#0a7a48}.wc-ok .ic svg{width:16px;height:16px}
.wc-ok b{font-size:14px}.wc-ok button{margin-left:auto}
.wc-qr{text-align:center;padding:6px 0}
.wc-qr img{width:230px;height:230px;background:#fff;border-radius:10px;padding:8px;border:1px solid var(--line)}
.steps2{text-align:left;max-width:250px;margin:12px auto 0;font-size:12.5px;color:var(--ink2);padding-left:18px}
.steps2 li{margin:4px 0}
.destbox{display:flex;flex-direction:column;gap:10px}
.dopt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer}
.dopt.on{border-color:var(--acc);background:var(--acc-soft)}
.dopt input{margin-top:3px}
.dopt b{font-size:13.5px;display:block}.dopt small{font-size:12px;color:var(--ink3)}
.numin{border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13.5px;color:var(--ink);width:100%}
.numin:disabled{background:#f4f5f9;color:var(--ink3)}
.destact{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.destact .toast{margin-right:auto}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.btn{font-size:13px;font-weight:600;padding:8px 15px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer}
.btn.p{background:var(--acc);border-color:var(--acc);color:#fff}.btn:hover{border-color:#cfd3de}.btn.p:hover{background:#5b4de0}.btn:disabled{opacity:.6;cursor:default}
</style>
<style id="variant-dashboard-design">

function cleanDraft(s){return (s||"").replace(/^\s*\[SENSITIVE[^\]]*\]\s*/i,"").trim();}
function cleanMessage(raw){
 const full=(raw||"").replace(/\r/g,"").trim();
 const lines=full.split("\n");const keep=[];let quoted=false,cut=0;
 for(const ln of lines){
   const s=ln.trim();
   if(/^>+/.test(s)||/^On\b.+\bwrote:?$/.test(s)||/^-{2,}\s*original message/i.test(s)||/^_{5,}$/.test(s)||/^From:\s.+/i.test(s)&&quoted){quoted=true;}
   if(quoted){cut++;continue;}
   keep.push(ln);
 }
 let main=keep.join("\n");
 main=main.replace(/https?:\/\/\S*list-manage\.com\S*/gi,"[email-preferences link]");
 main=main.replace(/https?:\/\/\S{45,}/gi,m=>m.slice(0,42)+"…");
 main=main.replace(/\n{3,}/g,"\n\n").trim();
 return {main, hasMore: cut>0 || main.length < full.length};
}

     detail+=`<div class="lab lab2">Reply to customer${t.priority?' <span class="pill">'+esc((t.priority||'').toUpperCase())+'</span>':''}</div>`;
     if(e)detail+=`<div class="warn">⚠ Flagged sensitive — read carefully before sending.</div>`;

   }else{
     detail+=`<div class="lab lab2">Why this needs you</div><div class="draft esc">${esc(t.reason||"Escalated — handled by a human.")}</div>`;
   }
   detail+=`</div></div>`;
 }
 return `<div class="row ${open?'open':''}" data-tk="${esc(key)}"><div class="who"><b>${esc(nameOf(t))}</b><small>${esc(t.customer_email||"")}</small></div>

}

 actBusy=false;render();

 <div class="toggle"><div><b style="font-size:13.5px">Post drafts to Gorgias</b><div class="hint">On = agent posts drafts as internal notes on tickets. Off = draft-only (safe review mode).</div></div><div class="sw ${writes?'on':''}" id="f-writes"><i></i></div></div>
 <div class="sec-title">Always escalate (never auto-reply)</div>
 <div class="panel"><div class="chips"><span>Refunds</span><span>Chargebacks</span><span>Damaged items</span><span>Wrong items</span><span>Cancellations</span><span>Angry customers</span></div></div>`;
}

async function loadKb(){
 kbData=await jget(KBAPI+"/list")||{folders:[]};
 if(kbData.reindex&&kbData.reindex.running){kbReindexing=true;pollReindex();}
 render();
}
async function openKbFile(p){
 kbSel=p;kbMsg="";kbBuf="Loading…";render();
 const d=await jget(KBAPI+"/file?path="+encodeURIComponent(p));
 kbBuf=d&&d.content!=null?d.content:"(failed to load)";render();
}
async function saveKb(){
 const ta=document.getElementById("kb-text");if(!ta||!kbSel)return;
 kbBuf=ta.value;kbMsg="Saving…";render();
 try{const r=await fetch(KBAPI+"/save",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({path:kbSel,content:kbBuf})});kbMsg=r.ok?"Saved — re-index to apply":"Save failed";}catch(e){kbMsg="Save failed";}
 render();
}
async function newKbFile(folder){
 const name=prompt("New "+folder.slice(0,-1)+" file name (e.g. warranty):");if(!name)return;
 const tmpl="---\ntitle: "+name+"\ncategory: "+folder+"\nstatus: confirmed\ntags: []\n---\n\n## Overview\n\n";
 try{const r=await fetch(KBAPI+"/new",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({folder:folder,filename:name,content:tmpl})});const d=await r.json();if(r.ok){await loadKb();openKbFile(d.path);}else{alert(d.error||"could not create file");}}catch(e){alert("could not create file");}
}
async function reindexKb(){
 if(kbReindexing)return;kbReindexing=true;kbMsg="";render();
 try{await fetch(KBAPI+"/reindex",{method:"POST"});}catch(e){}
 pollReindex();
}
function pollReindex(){
 setTimeout(async()=>{
  const s=await jget(KBAPI+"/reindex-status");
  if(s&&s.running){pollReindex();}
  else{kbReindexing=false;if(tab==="kb"){kbMsg=s&&s.ok?"Re-indexed — changes are live":"Re-index finished";render();}}
 },3000);
}

function waNum(jid){return jid?("+"+String(jid).split("@")[0]):"";}
let waSig="";
function waView(){
 if(!waData)return '<div class="ph2">Loading notification settings…</div>';
 const st=waData.state,conn=st==="connected";
 const n=waData.notify||{mode:"linked",number:""};
 if(waMode===null){waMode=n.mode||"linked";waNumber=n.number||"";}
 const accts=[["Gorgias",true],["Shopify",true],["Redo",true],["WhatsApp",conn],["Knowledge base",true]];
 const strip=accts.map(a=>`<div class="acct"><span class="dot ${a[1]?'':'off'}"></span>${esc(a[0])} <small>${a[1]?'Connected':'Not linked'}</small></div>`).join("");
 let wcard;
 if(conn){
   wcard=`<div class="wc-ok"><div class="ic g">${IC.check}</div><div><b>WhatsApp linked</b><div class="hint">Alerts arrive on ${esc(waNum(waData.owner))}</div></div><button class="btn" id="wa-unlink">Unlink</button></div>`;
 }else if(st==="qr"&&waData.qr){
   wcard=`<div class="wc-qr"><img src="${waData.qr}" alt="WhatsApp QR"><ol class="steps2"><li>Open <b>WhatsApp</b> on your phone</li><li>Tap <b>Settings → Linked devices</b></li><li>Tap <b>Link a device</b> and scan this code</li></ol></div>`;
 }else{
   wcard=`<div class="hint" style="padding:18px 0">Preparing your QR code… <span class="spin"></span></div>`;
 }
 const dest=`<div class="destbox">
   <label class="dopt ${waMode==='linked'?'on':''}"><input type="radio" name="wamode" value="linked" ${waMode==='linked'?'checked':''}> <span><b>My linked WhatsApp</b><small>Alerts go to the account linked here (most secure)</small></span></label>
   <label class="dopt ${waMode==='number'?'on':''}"><input type="radio" name="wamode" value="number" ${waMode==='number'?'checked':''}> <span><b>A specific number</b><small>Any WhatsApp number, with country code</small></span></label>
   <input class="numin" id="wa-number" placeholder="e.g. +1 555 123 4567" value="${esc(waNumber)}" ${waMode==='number'?'':'disabled'}>
   <div class="destact"><span class="toast">${esc(waMsg)}</span><button class="btn" id="wa-test" ${conn?'':'disabled'}>Send test alert</button><button class="btn p" id="wa-save">Save destination</button></div>
 </div>`;
 return `<div class="acctstrip">${strip}</div>
  <div class="grid2b">
   <div class="panel"><h3>WhatsApp alerts</h3><div class="ph">Scan once to receive escalation alerts on your phone</div>${wcard}</div>
   <div class="panel"><h3>Where alerts go</h3><div class="ph">Choose the destination for escalation notifications</div>${dest}</div>
  </div>`;
}
function stopWaPoll(){if(waPoll){clearTimeout(waPoll);waPoll=null;}}
function captureWaForm(){const mi=document.querySelector('input[name=wamode]:checked');const ni=document.getElementById("wa-number");if(mi)waMode=mi.value;if(ni)waNumber=ni.value;}
let waTick=0;
async function loadWa(){
 waData=await jget(WAAPI+"/status")||{state:"starting",notify:{mode:"linked",number:""}};
 waSig=waData.state+"|"+(waData.owner||"")+"|"+(waData.qr||"");
 waTick=0;
 render();
 stopWaPoll();
 if(tab==="notif")waPoll=setTimeout(loadWaSilent,3000);
}
async function loadWaSilent(){
 if(tab!=="notif"){stopWaPoll();return;}
 const d=await jget(WAAPI+"/status");
 if(d){
   const sig=d.state+"|"+(d.owner||"")+"|"+(d.qr||"");
   waTick++;
   // re-render whenever anything changed, and force a full refresh every 30s (10 x 3s)
   if(sig!==waSig||waTick>=10){captureWaForm();waData=d;waSig=sig;waTick=0;render();}
 }
 if(tab==="notif")waPoll=setTimeout(loadWaSilent,3000);
}
async function saveWa(){
 captureWaForm();waMsg="Saving…";render();
 try{const r=await fetch(WAAPI+"/notify",{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify({mode:waMode,number:waNumber})});const j=await r.json();waMsg=r.ok?"Saved ✓":(j.error||"Save failed");}catch(e){waMsg="Save failed";}
 render();
}
async function testWa(){
 captureWaForm();waMsg="Sending test…";render();
 try{const r=await fetch(WAAPI+"/test",{method:"POST"});const j=await r.json();waMsg=r.ok?("Test sent to "+waNum(j.to)):(j.error||"Could not send");}catch(e){waMsg="Could not send";}
 render();
}
async function unlinkWa(){
 if(!confirm("Unlink this WhatsApp? You'll need to scan a new QR to receive alerts again."))return;
 waMsg="Unlinking…";render();
 try{await fetch(WAAPI+"/logout",{method:"POST"});}catch(e){}
 waMsg="Unlinked — scan the new QR below to re-link.";waSig="";setTimeout(loadWa,1500);render();
}
function fmtWhen(iso){try{return new Date(iso).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}catch(e){return iso;}}
function noticesView(){
 if(!noticesData)return '<div class="empty">Loading…</div>';
 const list=noticesData.notices||[];
 const live=list.filter(n=>n.active), gone=list.filter(n=>!n.active);
 const card=n=>{
  const badge=n.active?'<span style="background:var(--acc-soft);color:var(--acc);padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600">Live</span>':'<span style="background:#f1f2f6;color:var(--ink3);padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600">Expired</span>';
  const when=n.expires_at?((n.active?'Auto-removes ':'Expired ')+fmtWhen(n.expires_at)):'No deadline — stays until you remove it';
  return `<div class="panel" style="display:flex;gap:14px;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
   <div style="flex:1;min-width:0"><div style="font-size:14.5px;color:var(--ink);line-height:1.55;white-space:pre-wrap">${esc(n.text)}</div>
   <div style="margin-top:9px;display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--ink3)">${badge}<span>${esc(when)}</span></div></div>
   <button class="btn" data-del="${esc(n.id)}">Remove</button></div>`;
 };
 return `<div class="panel">
   <h3>Post a notice</h3>
   <div class="ph">Whatever you post here becomes the truth your agent tells customers — it overrides any conflicting policy, FAQ, or product detail while it is live.</div>
   <textarea id="nb-text" spellcheck="true" style="width:100%;min-height:74px;border:1px solid #e3e5ee;border-radius:9px;padding:11px 12px;font:inherit;font-size:14px;resize:vertical;box-sizing:border-box" placeholder="e.g. Same-day delivery with free shipping on all orders this weekend.">${esc(noticeText)}</textarea>
   <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:11px">
     <label class="hint" style="margin:0">Auto-remove at (optional)</label>
     <input type="datetime-local" id="nb-when" class="numin" style="width:auto" value="${esc(noticeDeadline)}">
     <span class="toast" style="flex:1">${esc(noticeMsg)}</span>
     <button class="btn p" id="nb-post" ${noticeBusy?'disabled':''}>${noticeBusy?'Posting…':'Post notice'}</button>
   </div>
   <div class="hint" style="margin-top:8px">Leave the time empty to keep a notice up until you remove it. Takes effect instantly — no re-index needed.</div>
 </div>
 <div class="sec-title">Live notices${live.length?' ('+live.length+')':''}</div>
 ${live.length?live.map(card).join(""):'<div class="panel"><div class="hint">No live notices. Your agent is answering from its normal knowledge base.</div></div>'}
 ${gone.length?'<div class="sec-title">Recently expired</div>'+gone.map(card).join(""):''}`;
}
async function loadNotices(){
 noticesData=await jget(KBAPI+"/notices")||{notices:[]};
 render();
}
async function postNotice(){
 const ta=document.getElementById("nb-text"),wi=document.getElementById("nb-when");
 if(ta)noticeText=ta.value;if(wi)noticeDeadline=wi.value;
 if(!noticeText.trim()){noticeMsg="Write the notice first.";render();return;}
 let expires_at=null;
 if(noticeDeadline){const d=new Date(noticeDeadline);if(!isNaN(d.getTime()))expires_at=d.toISOString();}
 noticeBusy=true;noticeMsg="";render();
 try{
  const r=await fetch(KBAPI+"/notices",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({text:noticeText.trim(),expires_at})});
  const j=await r.json();
  if(r.ok){noticeText="";noticeDeadline="";noticeMsg="Posted ✓ — your agent uses this now.";noticesData=await jget(KBAPI+"/notices")||{notices:[]};}
  else{noticeMsg="Could not post: "+(j.error||r.status);}
 }catch(e){noticeMsg="Could not post.";}
 noticeBusy=false;render();
}
async function deleteNotice(id){
 if(!confirm("Remove this notice? Your agent will go back to its normal answers."))return;
 try{await fetch(KBAPI+"/notices/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id})});}catch(e){}
 noticesData=await jget(KBAPI+"/notices")||{notices:[]};render();
}
function bind(){
 document.querySelectorAll("[data-go-filter]").forEach(b=>b.onclick=()=>goTickets(b.dataset.goFilter));
 document.querySelectorAll("[data-go-ticket]").forEach(b=>b.onclick=()=>goTickets("all",b.dataset.goTicket));
 const retry=document.getElementById("retry-load");if(retry)retry.onclick=boot;
 document.querySelectorAll(".chip[data-f]").forEach(c=>c.onclick=()=>{filter=c.dataset.f;openTk=null;render();});
 document.querySelectorAll(".row[data-tk]").forEach(r=>r.onclick=()=>{if(openTk===String(r.dataset.tk)){openTk=null;render();}else{openTicket(r.dataset.tk);}});
 const as=document.getElementById("act-send");if(as)as.onclick=sendReply;
 const an=document.getElementById("act-note");if(an)an.onclick=noteReply;
 const ae=document.getElementById("act-edit");if(ae)ae.onclick=()=>{captureAct();actEditOpen=!actEditOpen;render();};
 const ar=document.getElementById("act-rewrite");if(ar)ar.onclick=rewriteDraft;
 const acx=document.getElementById("act-canceledit");if(acx)acx.onclick=()=>{captureAct();actEditOpen=false;render();};
 const arw=document.getElementById("act-raw");if(arw)arw.onclick=()=>{captureAct();actShowRaw=!actShowRaw;render();};
 const w=document.getElementById("f-writes");if(w)w.onclick=async()=>{const nv=!((settings.gorgias_writes_enabled||"false")==="true");settings.gorgias_writes_enabled=nv?"true":"false";render();try{await fetch(API+"/settings",{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify({gorgias_writes_enabled:settings.gorgias_writes_enabled})});}catch(e){}};
 document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openKbFile(b.dataset.open));
 document.querySelectorAll("[data-new]").forEach(b=>b.onclick=()=>newKbFile(b.dataset.new));
 const ks=document.getElementById("kb-save");if(ks)ks.onclick=saveKb;
 const kr=document.getElementById("kb-reindex");if(kr)kr.onclick=reindexKb;
 const ws=document.getElementById("wa-save");if(ws)ws.onclick=saveWa;
 const wt=document.getElementById("wa-test");if(wt)wt.onclick=testWa;
 const wu=document.getElementById("wa-unlink");if(wu)wu.onclick=unlinkWa;
 document.querySelectorAll('input[name=wamode]').forEach(r=>r.onchange=()=>{captureWaForm();render();});
 const np=document.getElementById("nb-post");if(np)np.onclick=postNotice;
 const nt=document.getElementById("nb-text");if(nt)nt.oninput=()=>{noticeText=nt.value;};
 const nw=document.getElementById("nb-when");if(nw)nw.oninput=()=>{noticeDeadline=nw.value;};
 document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteNotice(b.dataset.del));
}
boot();
</script>
</body>
</html>
